<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chatbot — ศาลจังหวัดลพบุรี</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;font-family:'Sarabun',sans-serif;background:#0a1522}
  #splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;
    background:radial-gradient(1000px 600px at 50% 18%,rgba(45,213,224,.16),transparent 55%),
    radial-gradient(800px 500px at 85% 100%,rgba(45,213,224,.1),transparent 50%),
    linear-gradient(160deg,#071019,#0a1522 55%,#08131f)}
  .bot{position:relative;width:150px;height:150px;margin-bottom:8px;animation:float 3s ease-in-out infinite}
  .bot .body{width:150px;height:150px;border-radius:34px;background:linear-gradient(160deg,#3fe0ec,#1aa9bd);
    box-shadow:0 0 60px rgba(45,213,224,.55),inset 0 -14px 30px rgba(0,0,0,.18);position:relative}
  .bot .eye{position:absolute;top:56px;width:26px;height:34px;border-radius:14px;background:#0a1522;animation:blink 4s infinite}
  .bot .eye.l{left:38px}.bot .eye.r{right:38px}
  .bot .ant{position:absolute;top:-24px;width:6px;height:24px;background:#2bc6d6;border-radius:4px}
  .bot .ant.l{left:34px;transform:rotate(-15deg)}.bot .ant.r{right:34px;transform:rotate(15deg)}
  .bot .ant b{position:absolute;top:-11px;left:-5px;width:16px;height:16px;border-radius:50%;background:#5cf0fb;box-shadow:0 0 14px #5cf0fb}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  @keyframes blink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.1)}}
  .title{font-size:48px;font-weight:800;letter-spacing:6px;color:#eafcff;margin-top:12px;text-shadow:0 0 22px rgba(45,213,224,.6),0 0 44px rgba(45,213,224,.3)}
  .sub{font-size:14px;color:rgba(148,208,216,.9);margin-top:2px;letter-spacing:.5px}
  .dots{margin:22px 0 26px;color:#7fd6df;font-size:13px}
  .dots i{display:inline-block;width:8px;height:8px;border-radius:50%;background:#3fe0ec;margin:0 3px;animation:pulse 1.2s infinite}
  .dots i:nth-child(2){animation-delay:.2s}.dots i:nth-child(3){animation-delay:.4s}
  @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
  .enter{display:inline-flex;align-items:center;gap:10px;padding:16px 36px;border:none;border-radius:999px;cursor:pointer;text-decoration:none;
    font:700 17px 'Sarabun';color:#052027;background:linear-gradient(135deg,#5cf0fb,#22b8cc);box-shadow:0 14px 34px rgba(45,213,224,.4);transition:.2s}
  .enter:hover{transform:translateY(-3px);box-shadow:0 20px 44px rgba(45,213,224,.6)}
  .foot{margin-top:26px;font-size:12px;color:rgba(120,170,180,.7)}
  @media(max-width:480px){.title{font-size:38px}.bot,.bot .body{width:120px;height:120px}}
</style>
</head>
<body>
<div id="splash">
  <div class="bot">
    <span class="ant l"><b></b></span><span class="ant r"><b></b></span>
    <div class="body"><span class="eye l"></span><span class="eye r"></span></div>
  </div>
  <div class="title">CHATBOT</div>
  <div class="sub">ศูนย์ข้อมูล · ศาลจังหวัดลพบุรี</div>
  <div class="dots">บอทพร้อมให้บริการ <i></i><i></i><i></i></div>
  <a class="enter" href="https://script.google.com/macros/s/AKfycbwojYt6ZB4aAI8QvKqFdFzr3_72ccwYRnhYENrAF-7PpRyr6AOBkL7NWOg5KELipznp/exec" target="_blank" rel="noopener">🤖 เข้าสู่ระบบ →</a>
  <div class="foot">ตอบคำถาม · บันทึกหมาย · พิกัด ตลอด 24 ชม.</div>
</div>
</body>
</html>
