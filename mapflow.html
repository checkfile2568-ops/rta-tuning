<!DOCTYPE html>
<!--
  Mapflow embed host — ธีมกรมท่า-ทอง (navy/gold)
  อัปโหลดไฟล์นี้ขึ้น repo rta-tuning โดยใช้ชื่อ "mapflow.html" (ห้ามใช้ index.html)
  เปิดใช้งานที่: https://checkfile2568-ops.github.io/rta-tuning/mapflow.html
-->
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b1a33">
  <meta name="color-scheme" content="dark">

  <title>Mapflow — แผนที่จุดเดินริ้วขบวน</title>
  <meta name="description" content="Mapflow ระบบจัดทำและแสดงแผนที่จุดเดินริ้วขบวนแบบเรียลไทม์ ใช้งานง่ายบนทุกอุปกรณ์">
  <meta name="author" content="Mapflow">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Mapflow — แผนที่จุดเดินริ้วขบวน">
  <meta property="og:description" content="ระบบจัดทำและแสดงแผนที่จุดเดินริ้วขบวนแบบเรียลไทม์">
  <meta property="og:locale" content="th_TH">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Mapflow — แผนที่จุดเดินริ้วขบวน">
  <meta name="twitter:description" content="ระบบจัดทำและแสดงแผนที่จุดเดินริ้วขบวนแบบเรียลไทม์">

  <!-- Inline SVG favicon (navy/gold — ไม่ต้องมีไฟล์แยก) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='26' fill='%230d2144'/%3E%3Cpath d='M50 20a18 18 0 0 0-18 18c0 13 18 32 18 32s18-19 18-32A18 18 0 0 0 50 20zm0 25a7 7 0 1 1 0-14 7 7 0 0 1 0 14z' fill='%23e6c674'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='26' fill='%230d2144'/%3E%3Cpath d='M50 20a18 18 0 0 0-18 18c0 13 18 32 18 32s18-19 18-32A18 18 0 0 0 50 20zm0 25a7 7 0 1 1 0-14 7 7 0 0 1 0 14z' fill='%23e6c674'/%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://script.google.com">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #12294c;
      --navy-deep: #0b1a33;
      --navy-2: #0d2144;
      --gold: #e6c674;
      --gold-soft: #c9a24b;
      --ink: #f4ecd6;
      --ease: cubic-bezier(.22, 1, .36, 1);
      --head: "Prompt", system-ui, sans-serif;
      --body: "Sarabun", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--navy-deep);
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    #app {
      display: block;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      border: 0;
      background: #eef0f4;
    }

    /* ---------- Loader ---------- */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px;
      color: var(--ink);
      text-align: center;
      overflow: hidden;
      background:
        radial-gradient(1000px 520px at 15% -10%, rgba(201,162,75,.20), transparent 55%),
        linear-gradient(150deg, #0b1a33, #12294c 60%, #0d2144);
      transition: opacity .4s var(--ease), visibility .4s var(--ease);
    }

    /* แสงทองเรืองพื้นหลังเคลื่อนไหวนุ่ม ๆ */
    #loader::before,
    #loader::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(46px);
      pointer-events: none;
      z-index: 0;
    }
    #loader::before {
      width: 58vmax; height: 58vmax;
      top: -24vmax; left: -16vmax;
      background: radial-gradient(circle, rgba(230,198,116,.22), transparent 62%);
      animation: float1 12s var(--ease) infinite alternate;
    }
    #loader::after {
      width: 50vmax; height: 50vmax;
      bottom: -22vmax; right: -14vmax;
      background: radial-gradient(circle, rgba(28,58,104,.55), transparent 62%);
      animation: float2 14s var(--ease) infinite alternate;
    }

    #loader.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 440px;
      width: 100%;
    }

    .logo {
      position: relative;
      width: 88px;
      height: 88px;
      display: grid;
      place-items: center;
      margin-bottom: 20px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #1c3a68, #0c1c38);
      border: 2px solid var(--gold-soft);
      box-shadow: 0 22px 55px rgba(0, 0, 0, .45);
      animation: pop .6s var(--ease) both;
    }
    .logo svg { width: 42px; height: 42px; }
    /* วงแหวนทองเรืองรอบโลโก้ */
    .logo::after {
      content: "";
      position: absolute;
      inset: -7px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      background: conic-gradient(from 0deg, transparent, var(--gold), transparent 55%) border-box;
      -webkit-mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: spin 4.5s linear infinite;
    }

    h1 {
      margin: 0;
      font-family: var(--head);
      font-size: clamp(24px, 5.4vw, 34px);
      font-weight: 700;
      letter-spacing: .5px;
      color: #fff;
    }
    h1 span { color: var(--gold); }

    .subtitle {
      margin-top: 7px;
      font-family: var(--body);
      color: rgba(230, 198, 116, .82);
      font-size: 14px;
      letter-spacing: .2px;
    }

    /* แถบความคืบหน้าแบบ indeterminate (ทอง) */
    .progress {
      position: relative;
      width: 210px;
      height: 4px;
      margin: 28px 0 14px;
      border-radius: 99px;
      background: rgba(230, 198, 116, .16);
      overflow: hidden;
    }
    .progress::before {
      content: "";
      position: absolute;
      inset: 0;
      width: 40%;
      border-radius: 99px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--gold-soft));
      animation: slide 1.3s var(--ease) infinite;
    }

    .status {
      color: rgba(244, 236, 214, .78);
      font-size: 13px;
      min-height: 1.2em;
    }

    /* ---------- Fallback card ---------- */
    #fallback {
      display: none;
      max-width: 434px;
      width: 100%;
      margin-top: 24px;
      padding: 18px 18px 16px;
      border: 1px solid rgba(230, 198, 116, .28);
      border-radius: 16px;
      background: rgba(12, 28, 56, .55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 18px 44px rgba(0, 0, 0, .4);
      animation: pop .4s var(--ease) both;
    }
    #fallback.show { display: block; }

    #fallback .fb-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-family: var(--head);
      font-size: 15px;
      font-weight: 600;
      color: var(--gold);
    }
    #fallback .fb-title svg { flex: none; }

    #fallback p {
      margin: 0 0 14px;
      color: rgba(244, 236, 214, .78);
      font-size: 13px;
      line-height: 1.65;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      flex: 1 1 auto;
      min-height: 46px;
      padding: 0 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border: 0;
      border-radius: 12px;
      font-family: var(--head);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: transform .15s var(--ease), box-shadow .15s var(--ease), filter .15s;
    }
    .btn-primary {
      color: #1a1204;
      background: linear-gradient(135deg, #f0d888, #c9a24b);
      box-shadow: 0 10px 24px rgba(201, 162, 75, .35);
    }
    .btn-ghost {
      flex: 0 0 auto;
      color: var(--ink);
      background: rgba(230, 198, 116, .10);
      border: 1px solid rgba(230, 198, 116, .32);
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
    .btn:active { transform: translateY(0); }
    .btn:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    /* ---------- Animations ---------- */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(360%); }
    }
    @keyframes pop {
      from { opacity: 0; transform: translateY(10px) scale(.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes float1 { to { transform: translate(6vmax, 4vmax) scale(1.1); } }
    @keyframes float2 { to { transform: translate(-5vmax, -4vmax) scale(1.12); } }

    @media (prefers-reduced-motion: reduce) {
      #loader::before, #loader::after,
      .logo, .logo::after, .progress::before,
      #fallback, .btn { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div id="loader" role="status" aria-live="polite">
    <div class="loader-inner">
      <div class="logo" aria-hidden="true">
        <!-- หมุดแผนที่ทอง -->
        <svg viewBox="0 0 24 24" fill="none" stroke="#e6c674" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s7-6.3 7-11a7 7 0 1 0-14 0c0 4.7 7 11 7 11z"></path>
          <circle cx="12" cy="10" r="2.6" fill="#e6c674" stroke="none"></circle>
        </svg>
      </div>
      <h1>Map<span>flow</span></h1>
      <div class="subtitle">ระบบจัดทำแผนที่จุดเดินริ้วขบวน</div>
      <div class="progress" aria-hidden="true"></div>
      <div class="status" id="status">กำลังเชื่อมต่อระบบ…</div>

      <div id="fallback">
        <div class="fb-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e6c674" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
          เปิดระบบภายในหน้านี้ไม่สำเร็จ
        </div>
        <p>
          ระบบใช้เวลาโหลดนานกว่าปกติ หรือเบราว์เซอร์ไม่อนุญาตให้เปิดภายในกรอบ (iframe)
          กรุณาลองใหม่ หรือเปิดระบบโดยตรงในแท็บใหม่
        </p>
        <div class="btn-row">
          <a class="btn btn-primary"
             href="https://script.google.com/macros/s/AKfycbzbwK-625ooqJHEDv-mNKXDy6dWyLT_NyBTlnzSxRG_1L8wmsxYrcucW5wzKnjwIUse/exec"
             target="_blank" rel="noopener">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
              <polyline points="15 3 21 3 21 9"></polyline>
              <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
            เปิดในแท็บใหม่
          </a>
          <button class="btn btn-ghost" id="retryBtn" type="button">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"></polyline>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            ลองใหม่
          </button>
        </div>
      </div>
    </div>
  </div>

  <iframe
    id="app"
    title="Mapflow — แผนที่จุดเดินริ้วขบวน"
    src="https://script.google.com/macros/s/AKfycbzbwK-625ooqJHEDv-mNKXDy6dWyLT_NyBTlnzSxRG_1L8wmsxYrcucW5wzKnjwIUse/exec"
    allow="clipboard-write; fullscreen; geolocation; camera"
    referrerpolicy="no-referrer-when-downgrade"
    loading="eager"
    allowfullscreen>
  </iframe>

  <!-- ถ้าปิด JavaScript: ซ่อน loader เพื่อไม่ให้บังระบบ + แสดงลิงก์สำรอง -->
  <noscript>
    <style>
      #loader .progress, #loader .status { display: none; }
      #loader #fallback { display: block; }
    </style>
  </noscript>

  <script>
    (function () {
      var loader   = document.getElementById('loader');
      var frame    = document.getElementById('app');
      var fallback = document.getElementById('fallback');
      var status   = document.getElementById('status');
      var retryBtn = document.getElementById('retryBtn');

      var loaded = false;
      var timeoutId = null;
      var LOAD_TIMEOUT = 12000; // 12 วินาที

      function hideLoader() { loader.classList.add('hide'); }
      function showFallback(msg) { status.textContent = msg; fallback.classList.add('show'); }

      function startTimeout() {
        clearTimeout(timeoutId);
        timeoutId = setTimeout(function () {
          if (!loaded) showFallback('ยังไม่สามารถเปิดระบบภายในหน้านี้ได้');
        }, LOAD_TIMEOUT);
      }

      frame.addEventListener('load', function () {
        loaded = true;
        clearTimeout(timeoutId);
        status.textContent = 'เปิดระบบเรียบร้อยแล้ว';
        setTimeout(hideLoader, 300);
      });

      // ถ้าเบราว์เซอร์บล็อก iframe จะไม่ยิง load — timeout จะจับได้
      frame.addEventListener('error', function () {
        showFallback('ไม่สามารถโหลดระบบได้');
      });

      // ปุ่มลองใหม่: รีโหลด iframe โดยไม่ต้องรีเฟรชทั้งหน้า
      retryBtn.addEventListener('click', function () {
        loaded = false;
        fallback.classList.remove('show');
        loader.classList.remove('hide');
        status.textContent = 'กำลังเชื่อมต่อระบบอีกครั้ง…';
        var base = frame.getAttribute('src').split('#')[0].split('?_r=')[0];
        var sep = base.indexOf('?') === -1 ? '?_r=' : '&_r=';
        frame.setAttribute('src', base + sep + Date.now());
        startTimeout();
      });

      // เมื่อกลับมาที่แท็บ ถ้ายังไม่โหลดสำเร็จให้เริ่มจับเวลาใหม่
      document.addEventListener('visibilitychange', function () {
        if (!document.hidden && !loaded) startTimeout();
      });

      // รับคำสั่งเปลี่ยนหน้าจากแอปข้างใน (แก้ปัญหา sandbox ห้ามเฟรมในเปลี่ยนหน้าเฟรมแม่)
      window.addEventListener('message', function (e) {
        var d = e.data;
        if (d && d.type === 'mf-nav' && typeof d.url === 'string'
            && d.url.indexOf('https://script.google.com/') === 0) {
          loaded = false;
          loader.classList.remove('hide');
          fallback.classList.remove('show');
          status.textContent = 'กำลังเปลี่ยนหน้า…';
          frame.setAttribute('src', d.url);
          startTimeout();
        }
      });

      startTimeout();
    })();
  </script>
</body>
</html>
