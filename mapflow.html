<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4c1d95">
  <title>Mapflow — แผนที่จุดเดินริ้วขบวน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple: #6d28d9;
      --purple-dark: #3b176f;
      --cyan: #06b6d4;
      --gold: #f2cf70;
      --bg: #111827;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      font-family: "Sarabun", sans-serif;
    }

    #app {
      display: block;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      border: 0;
      background: #eef0f4;
    }

    #loader {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
      text-align: center;
      background:
        radial-gradient(850px 480px at 15% -5%, rgba(124, 58, 237, .45), transparent 60%),
        radial-gradient(700px 440px at 95% 105%, rgba(6, 182, 212, .25), transparent 60%),
        linear-gradient(145deg, #231042, #111827 58%, #0f2747);
      transition: opacity .28s ease, visibility .28s ease;
    }

    #loader.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .logo {
      width: 76px;
      height: 76px;
      display: grid;
      place-items: center;
      margin-bottom: 16px;
      border: 2px solid rgba(255, 255, 255, .82);
      border-radius: 24px;
      color: #fff;
      font-size: 38px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      box-shadow: 0 22px 55px rgba(0, 0, 0, .32);
    }

    h1 {
      margin: 0;
      font-size: clamp(20px, 4vw, 30px);
      font-weight: 700;
    }

    .subtitle {
      margin-top: 5px;
      color: rgba(255, 255, 255, .75);
      font-size: 13px;
    }

    .spinner {
      width: 38px;
      height: 38px;
      margin: 22px 0 13px;
      border: 4px solid rgba(255, 255, 255, .2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .status {
      color: rgba(255, 255, 255, .8);
      font-size: 12px;
    }

    #fallback {
      display: none;
      max-width: 420px;
      margin-top: 20px;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 14px;
      background: rgba(255, 255, 255, .08);
      backdrop-filter: blur(10px);
    }

    #fallback.show { display: block; }

    #fallback p {
      margin: 0 0 12px;
      color: rgba(255, 255, 255, .82);
      font-size: 12px;
      line-height: 1.55;
    }

    #fallback a {
      min-height: 40px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="logo">M</div>
    <h1>Mapflow</h1>
    <div class="subtitle">ระบบจัดทำแผนที่จุดเดินริ้วขบวน</div>
    <div class="spinner" aria-hidden="true"></div>
    <div class="status" id="status">กำลังเชื่อมต่อระบบ…</div>

    <div id="fallback">
      <p>
        ระบบใช้เวลาโหลดนานกว่าปกติ หรือเบราว์เซอร์ไม่อนุญาตให้เปิดภายในกรอบ
        กรุณาเปิดระบบโดยตรง
      </p>
      <a href="https://script.google.com/macros/s/AKfycbzZSthkSvL6HeRAcNhGTb7GhnRz82koNwImss8CujGc5uXjRCgRpz1d7DQRehActBAc/exec" target="_blank" rel="noopener">เปิด Mapflow ในแท็บใหม่</a>
    </div>
  </div>

  <iframe
    id="app"
    title="Mapflow — แผนที่จุดเดินริ้วขบวน"
    src="https://script.google.com/macros/s/AKfycbzZSthkSvL6HeRAcNhGTb7GhnRz82koNwImss8CujGc5uXjRCgRpz1d7DQRehActBAc/exec"
    allow="clipboard-write; fullscreen; geolocation; camera"
    allowfullscreen>
  </iframe>

  <script>
    (function () {
      const loader = document.getElementById('loader');
      const frame = document.getElementById('app');
      const fallback = document.getElementById('fallback');
      const status = document.getElementById('status');
      let loaded = false;

      frame.addEventListener('load', function () {
        loaded = true;
        status.textContent = 'เปิดระบบเรียบร้อยแล้ว';
        window.setTimeout(function () {
          loader.classList.add('hide');
        }, 250);
      });

      window.setTimeout(function () {
        if (!loaded) {
          status.textContent = 'ยังไม่สามารถเปิดระบบภายในหน้านี้ได้';
          fallback.classList.add('show');
        }
      }, 8000);
    })();
  </script>
</body>
</html>
