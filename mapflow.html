  <style>
    :root {
      --purple: #7c3aed;
      --purple-dark: #3b176f;
      --cyan: #06b6d4;
      --gold: #f2cf70;
      --bg: #0f1424;
      --ease: cubic-bezier(.22, 1, .36, 1);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      font-family: "Sarabun", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    #app {
      display: block;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      border: 0;
      background: #eef0f4;
    }

    /* ---------- Loader ---------- */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px;
      color: #fff;
      text-align: center;
      overflow: hidden;
      background: linear-gradient(150deg, #231042, #131a30 55%, #0d2440);
      transition: opacity .4s var(--ease), visibility .4s var(--ease);
    }

    /* แสงเรืองพื้นหลังแบบเคลื่อนไหวนุ่ม ๆ */
    #loader::before,
    #loader::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: .55;
      pointer-events: none;
      z-index: 0;
    }
    #loader::before {
      width: 60vmax; height: 60vmax;
      top: -22vmax; left: -14vmax;
      background: radial-gradient(circle, rgba(124,58,237,.55), transparent 62%);
      animation: float1 11s var(--ease) infinite alternate;
    }
    #loader::after {
      width: 52vmax; height: 52vmax;
      bottom: -20vmax; right: -12vmax;
      background: radial-gradient(circle, rgba(6,182,212,.4), transparent 62%);
      animation: float2 13s var(--ease) infinite alternate;
    }

    #loader.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 440px;
      width: 100%;
    }

    .logo {
      position: relative;
      width: 84px;
      height: 84px;
      display: grid;
      place-items: center;
      margin-bottom: 20px;
      border-radius: 26px;
      color: #fff;
      font-size: 42px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      box-shadow:
        0 22px 55px rgba(0, 0, 0, .38),
        inset 0 0 0 2px rgba(255, 255, 255, .28);
      animation: pop .6s var(--ease) both;
    }
    /* วงแหวนเรืองรอบโลโก้ */
    .logo::after {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 32px;
      border: 2px solid transparent;
      background: conic-gradient(from 0deg, var(--gold), var(--cyan), var(--purple), var(--gold)) border-box;
      -webkit-mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: .8;
      animation: spin 4s linear infinite;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 800;
      letter-spacing: .3px;
    }

    .subtitle {
      margin-top: 6px;
      color: rgba(255, 255, 255, .72);
      font-size: 13.5px;
    }

    /* แถบความคืบหน้าแบบ indeterminate */
    .progress {
      position: relative;
      width: 200px;
      height: 4px;
      margin: 26px 0 14px;
      border-radius: 99px;
      background: rgba(255, 255, 255, .14);
      overflow: hidden;
    }
    .progress::before {
      content: "";
      position: absolute;
      inset: 0;
      width: 40%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--purple), var(--cyan), var(--gold));
      animation: slide 1.3s var(--ease) infinite;
    }

    .status {
      color: rgba(255, 255, 255, .82);
      font-size: 12.5px;
      min-height: 1.2em;
    }

    /* ---------- Fallback card ---------- */
    #fallback {
      display: none;
      max-width: 430px;
      width: 100%;
      margin-top: 24px;
      padding: 18px 18px 16px;
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 16px;
      background: rgba(255, 255, 255, .07);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      animation: pop .4s var(--ease) both;
    }
    #fallback.show { display: block; }

    #fallback .fb-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }
    #fallback .fb-title svg { flex: none; }

    #fallback p {
      margin: 0 0 14px;
      color: rgba(255, 255, 255, .78);
      font-size: 12.5px;
      line-height: 1.6;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      flex: 1 1 auto;
      min-height: 44px;
      padding: 0 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border: 0;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: transform .15s var(--ease), box-shadow .15s var(--ease), background .15s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      box-shadow: 0 10px 24px rgba(124, 58, 237, .4);
    }
    .btn-ghost {
      flex: 0 0 auto;
      background: rgba(255, 255, 255, .1);
      border: 1px solid rgba(255, 255, 255, .2);
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    /* ---------- Animations ---------- */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    @keyframes pop {
      from { opacity: 0; transform: translateY(10px) scale(.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes float1 {
      to { transform: translate(6vmax, 4vmax) scale(1.1); }
    }
    @keyframes float2 {
      to { transform: translate(-5vmax, -4vmax) scale(1.12); }
    }

    /* เคารพผู้ใช้ที่ปิดการเคลื่อนไหว */
    @media (prefers-reduced-motion: reduce) {
      #loader::before, #loader::after,
      .logo, .logo::after, .progress::before,
      #fallback, .btn { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div id="loader" role="status" aria-live="polite">
    <div class="loader-inner">
      <div class="logo" aria-hidden="true">M</div>
      <h1>Mapflow</h1>
      <div class="subtitle">ระบบจัดทำแผนที่จุดเดินริ้วขบวน</div>
      <div class="progress" aria-hidden="true"></div>
      <div class="status" id="status">กำลังเชื่อมต่อระบบ…</div>

      <div id="fallback">
        <div class="fb-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f2cf70" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
          เปิดระบบภายในหน้านี้ไม่สำเร็จ
        </div>
        <p>
          ระบบใช้เวลาโหลดนานกว่าปกติ หรือเบราว์เซอร์ไม่อนุญาตให้เปิดภายในกรอบ (iframe)
          กรุณาลองใหม่ หรือเปิดระบบโดยตรงในแท็บใหม่
        </p>
        <div class="btn-row">
          <a class="btn btn-primary"
             href="https://script.google.com/macros/s/AKfycbzbwK-625ooqJHEDv-mNKXDy6dWyLT_NyBTlnzSxRG_1L8wmsxYrcucW5wzKnjwIUse/exec"
             target="_blank" rel="noopener">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
              <polyline points="15 3 21 3 21 9"></polyline>
              <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
            เปิดในแท็บใหม่
          </a>
          <button class="btn btn-ghost" id="retryBtn" type="button">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"></polyline>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            ลองใหม่
          </button>
        </div>
      </div>
    </div>
  </div>

  <iframe
    id="app"
    title="Mapflow — แผนที่จุดเดินริ้วขบวน"
    src="https://script.google.com/macros/s/AKfycbzbwK-625ooqJHEDv-mNKXDy6dWyLT_NyBTlnzSxRG_1L8wmsxYrcucW5wzKnjwIUse/exec"
    allow="clipboard-write; fullscreen; geolocation; camera"
    referrerpolicy="no-referrer-when-downgrade"
    loading="eager"
    allowfullscreen>
  </iframe>

  <!-- ถ้าปิด JavaScript: ซ่อน loader เพื่อไม่ให้บังระบบ + แสดงลิงก์สำรอง -->
  <noscript>
    <style>
      #loader .progress, #loader .status { display: none; }
      #loader #fallback { display: block; }
    </style>
  </noscript>

  <script>
    (function () {
      var loader   = document.getElementById('loader');
      var frame    = document.getElementById('app');
      var fallback = document.getElementById('fallback');
      var status   = document.getElementById('status');
      var retryBtn = document.getElementById('retryBtn');

      var loaded = false;
      var timeoutId = null;
      var LOAD_TIMEOUT = 12000; // 12 วินาที

      function hideLoader() {
        loader.classList.add('hide');
      }

      function showFallback(msg) {
        status.textContent = msg;
        fallback.classList.add('show');
      }

      function startTimeout() {
        clearTimeout(timeoutId);
        timeoutId = setTimeout(function () {
          if (!loaded) {
            showFallback('ยังไม่สามารถเปิดระบบภายในหน้านี้ได้');
          }
        }, LOAD_TIMEOUT);
      }

      frame.addEventListener('load', function () {
        loaded = true;
        clearTimeout(timeoutId);
        status.textContent = 'เปิดระบบเรียบร้อยแล้ว';
        setTimeout(hideLoader, 300);
      });

      // ถ้าเบราว์เซอร์บล็อก iframe จะไม่ยิง load — timeout จะจับได้
      frame.addEventListener('error', function () {
        showFallback('ไม่สามารถโหลดระบบได้');
      });

      // ปุ่มลองใหม่: รีโหลด iframe โดยไม่ต้องรีเฟรชทั้งหน้า
      retryBtn.addEventListener('click', function () {
        loaded = false;
        fallback.classList.remove('show');
        loader.classList.remove('hide');
        status.textContent = 'กำลังเชื่อมต่อระบบอีกครั้ง…';
        var base = frame.getAttribute('src').split('#')[0].split('?_r=')[0];
        var sep = base.indexOf('?') === -1 ? '?_r=' : '&_r=';
        frame.setAttribute('src', base + sep + Date.now());
        startTimeout();
      });

      // เมื่อกลับมาที่แท็บ ถ้ายังไม่โหลดสำเร็จให้เริ่มจับเวลาใหม่
      document.addEventListener('visibilitychange', function () {
        if (!document.hidden && !loaded) startTimeout();
      });

      // รับคำสั่งเปลี่ยนหน้าจากแอปข้างใน (แก้ปัญหา sandbox ห้ามเฟรมในเปลี่ยนหน้าเฟรมแม่)
      window.addEventListener('message', function (e) {
        var d = e.data;
        if (d && d.type === 'mf-nav' && typeof d.url === 'string'
            && d.url.indexOf('https://script.google.com/') === 0) {
          loaded = false;
          loader.classList.remove('hide');
          fallback.classList.remove('show');
          status.textContent = 'กำลังเปลี่ยนหน้า…';
          frame.setAttribute('src', d.url);
          startTimeout();
        }
      });

      startTimeout();
    })();
  </script>
</body>
