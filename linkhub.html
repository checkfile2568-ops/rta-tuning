<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LinkHub V2 — ศาลจังหวัดลพบุรี</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;height:100%;background:#12294c;overflow:hidden}
  #app{border:0;width:100vw;height:100vh;display:block}
  #load{position:fixed;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'Sarabun',sans-serif;color:#e6c674;
    background:radial-gradient(1000px 500px at 15% -10%,rgba(201,162,75,.18),transparent 55%),linear-gradient(150deg,#0b1a33,#12294c 60%,#0d2144)}
  #load .em{width:70px;height:70px;border-radius:50%;font-size:32px;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 30%,#1c3a68,#0c1c38);border:2px solid #c9a24b;margin-bottom:16px}
  #load .sp{width:34px;height:34px;border:4px solid rgba(230,198,116,.25);border-top-color:#e6c674;border-radius:50%;animation:s .8s linear infinite;margin:14px 0 10px}
  #load .nm{font-weight:600;font-size:16px} #load .su{font-size:12px;color:rgba(230,198,116,.7);margin-top:3px}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="load"><div class="em">⚖</div><div class="nm">LinkHub V2</div><div class="su">ศาลจังหวัดลพบุรี</div><div class="sp"></div></div>
<iframe id="app" src="https://script.google.com/macros/s/AKfycbz9Cfxlp8W1g2POTfw8oWKvaqXKXQO8ugZSs-6rhfjmlNoqaVQ3D_-2gsdNW5eSmJ5b-Q/exec"
  onload="var l=document.getElementById('load');if(l)l.style.opacity=0,setTimeout(function(){l.style.display='none'},300)"
  allow="clipboard-write; fullscreen" allowfullscreen></iframe>
<script>
  setTimeout(function(){var l=document.getElementById('load');if(l)l.style.display='none';},6000);
  // 🆕 รับคำสั่งเปลี่ยนหน้าจากแอปข้างใน (แก้ปัญหา sandbox ห้ามเฟรมในเปลี่ยนหน้าเฟรมแม่)
  window.addEventListener('message', function(e){
    var d = e.data;
    if (d && d.type === 'lh-nav' && typeof d.url === 'string'
        && d.url.indexOf('https://script.google.com/') === 0) {
      var l = document.getElementById('load'); if (l){ l.style.display='flex'; l.style.opacity=1; }
      document.getElementById('app').src = d.url;
    }
  });
</script>
</body>
</html>
